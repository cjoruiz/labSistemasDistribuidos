syntax = "proto3";

package servicios;
option go_package = "/protos";

service StreamingService {
  rpc StreamAudio(StreamRequest) returns (stream AudioChunk);
  rpc AlmacenarAudio(AudioFileRequest) returns (AudioFileResponse);
  rpc RegistrarCallback(CallbackRegistroRequest) returns (CallbackRegistroResponse);
}

message StreamRequest {
  string audio_id = 1;
}

message AudioChunk {
  bytes data = 1;
}

message AudioFileRequest {
  string filename = 1;
  bytes data = 2;
}

message AudioFileResponse {
  bool success = 1;
  string message = 2;
  string audio_id = 3;
}

message CallbackRegistroRequest {
  string callback_url = 1;
}

message CallbackRegistroResponse {
  bool success = 1;
  string message = 2;
}

message CallbackNotification {
  string audio_id = 1;
  string titulo = 2;
  string fecha_hora = 3;
}
